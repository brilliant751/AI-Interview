[pytest]
filterwarnings =
    ignore:datetime.datetime.utcfromtimestamp\(\) is deprecated.*:DeprecationWarning:google\.protobuf\.internal\.well_known_types
    ignore:unclosed transport <_UnixSubprocessTransport.*:ResourceWarning
    ignore:subprocess .* is still running:ResourceWarning
    ignore:unclosed transport <_UnixReadPipeTransport.*:ResourceWarning
    ignore:unclosed file <_io\.FileIO name=.*:ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning
