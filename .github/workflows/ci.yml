name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AI_INTERVIEW_APP_ENV: dev
  AI_INTERVIEW_LLM_PROVIDER: mock
  AI_INTERVIEW_ASR_PROVIDER: mock
  AI_INTERVIEW_TTS_PROVIDER: mock
  AI_INTERVIEW_AUTH_ENABLE_DEV_STATIC_TOKEN: "true"
  AI_INTERVIEW_RETRIEVAL_FALLBACK_ENABLED: "true"
  AI_INTERVIEW_PROVIDER_TRUST_ENV: "false"

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install backend CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-ci.txt

      - name: Shell syntax check
        run: bash -n start.sh backend-start.sh frontend-start.sh scripts/*.sh

      - name: Compile backend
        run: python -m compileall backend/app backend/assets/scripts/data tests/backend

      - name: Data scripts dry run
        run: |
          python backend/assets/scripts/data/validate_materials.py --strict
          python backend/assets/scripts/data/normalize_materials.py --dry-run
          python backend/assets/scripts/data/build_question_bank.py --dry-run
          python backend/assets/scripts/data/build_knowledge_vectorstore.py --dry-run

      - name: Ruff
        run: python -m ruff check backend tests

      - name: Pytest
        env:
          AI_INTERVIEW_DB_PATH: ${{ runner.temp }}/ai-interview-test.db
          AI_INTERVIEW_CHROMA_DIR: ${{ runner.temp }}/ai-interview-chroma
        run: python -m pytest tests/backend

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Build
        env:
          VITE_API_BASE: http://localhost:18500/api/v1
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        env:
          VITE_API_BASE: http://localhost:18500/api/v1
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  windows-script-smoke:
    name: Windows script smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/start-windows.ps1 -Raw), [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }
          [System.Management.Automation.PSParser]::Tokenize((Get-Content scripts/test-windows.ps1 -Raw), [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }

      - name: Test script no-op smoke
        shell: pwsh
        env:
          SKIP_INSTALL: "1"
          RUN_BACKEND_TESTS: "0"
          RUN_FRONTEND_TESTS: "0"
          RUN_E2E: "0"
          RUN_LINT: "0"
        run: ./scripts/test-windows.ps1
