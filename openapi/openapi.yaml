      summary: Get Resume File
      description: 获取当前用户简历文件内容。
      operationId: get_resume_file_api_v1_resumes__resume_id__file_get
      security:
      - HTTPBearer: []
      parameters:
      - name: resume_id
        in: path
        required: true
        schema:
          type: string
          title: Resume Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/resumes/{resume_id}:
    delete:
      tags:
      - resumes
      summary: Delete Resume
      description: 删除当前用户简历。
      operationId: delete_resume_api_v1_resumes__resume_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: resume_id
        in: path
        required: true
        schema:
          type: string
          title: Resume Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/jds:
    post:
      tags:
      - jds
      summary: Upload Jd
      description: 上传用户 JD。
      operationId: upload_jd_api_v1_jds_post
      security:
      - HTTPBearer: []
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Idempotency-Key
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_jd_api_v1_jds_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDescriptionUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - jds
      summary: List Jds
      description: 查询 JD 列表。
      operationId: list_jds_api_v1_jds_get
      security:
      - HTTPBearer: []
      parameters:
      - name: job_role
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Job Role
      - name: source_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Type
      - name: title
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDescriptionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/jds/{jd_id}:
    delete:
