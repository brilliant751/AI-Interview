      description: 删除用户上传 JD。
      operationId: delete_jd_api_v1_jds__jd_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: jd_id
        in: path
        required: true
        schema:
          type: string
          title: Jd Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/interviews:
    post:
      tags:
      - interviews
      summary: Create Interview
      description: 创建新的面试会话。
      operationId: create_interview_api_v1_interviews_post
      security:
      - HTTPBearer: []
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Idempotency-Key
