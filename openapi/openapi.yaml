components:
  schemas:
    AdminQuestionBankCreateRequest:
      properties:
        job_role:
          type: string
          enum:
          - java
          - web
          title: Job Role
        category:
          type: string
          enum:
          - technical
          - project
          - scenario
          - behavior
          title: Category
        title:
          type: string
          maxLength: 200
          minLength: 1
          title: Title
        question:
          type: string
          maxLength: 10000
          minLength: 1
          title: Question
        analysis:
          type: string
          maxLength: 20000
          minLength: 1
          title: Analysis
        source_note:
          type: string
          maxLength: 200
          title: Source Note
          default: ''
      type: object
      required:
      - job_role
      - category
      - title
      - question
      - analysis
      title: AdminQuestionBankCreateRequest
      description: 管理端单题录入请求。
    AdminQuestionBankItemResponse:
      properties:
        record_id:
          type: string
          title: Record Id
        job_role:
          type: string
          title: Job Role
        question_no:
          type: integer
          title: Question No
        title:
          type: string
          title: Title
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        question:
          type: string
          title: Question
        analysis:
          anyOf:
          - type: string
          - type: 'null'
          title: Analysis
        source_path:
          type: string
          title: Source Path
        updated_at:
          type: string
          title: Updated At
      type: object
      required:
      - record_id
      - job_role
      - question_no
      - title
      - question
      - source_path
      - updated_at
      title: AdminQuestionBankItemResponse
      description: 管理端题库条目响应。
    AdminQuestionBankListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AdminQuestionBankItemResponse'
          type: array
          title: Items
        page:
          type: integer
          title: Page
        page_size:
          type: integer
          title: Page Size
        total:
          type: integer
          title: Total
      type: object
      required:
      - page
      - page_size
      - total
      title: AdminQuestionBankListResponse
      description: 管理端题库分页列表响应。
    AdminQuestionBankUploadRequest:
      properties:
        job_role:
          type: string
          enum:
          - java
          - web
          title: Job Role
        file_name:
          type: string
          maxLength: 255
