openapi: 3.1.0
info:
  title: AI Interview API
  version: v1
paths:
  /api/v1/auth/register:
    post:
      tags:
      - auth
      summary: Register
      description: 注册账号。
      operationId: register_api_v1_auth_register_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Login
      description: 账号密码登录。
      operationId: login_api_v1_auth_login_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh Token
      description: 刷新访问令牌。
      operationId: refresh_token_api_v1_auth_refresh_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: 登出并撤销刷新令牌。
      operationId: logout_api_v1_auth_logout_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - auth
      summary: Forgot Password
      description: 发起忘记密码流程。
      operationId: forgot_password_api_v1_auth_forgot_password_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - auth
      summary: Reset Password
      description: 执行密码重置。
      operationId: reset_password_api_v1_auth_reset_password_post
      parameters:
      - name: User-Agent
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User-Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Me
      description: 获取当前登录用户信息。
      operationId: me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
      security:
      - HTTPBearer: []
  /api/v1/companies:
    get:
      tags:
      - companies
      summary: List Companies
      description: 查询公司列表。
      operationId: list_companies_api_v1_companies_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyListResponse'
      security:
      - HTTPBearer: []
  /api/v1/coding-practice/questions:
    get:
      tags:
      - coding-practice
      summary: List Coding Practice Questions
      description: 获取编程练习题列表。
      operationId: list_coding_practice_questions_api_v1_coding_practice_questions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeQuestionListResponse'
      security:
      - HTTPBearer: []
  /api/v1/coding-practice/sessions:
    post:
      tags:
      - coding-practice
      summary: Create Coding Practice Session
      description: 创建或恢复编程练习会话。
      operationId: create_coding_practice_session_api_v1_coding_practice_sessions_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodingPracticeCreateSessionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/coding-practice/sessions/{session_id}:
    get:
      tags:
      - coding-practice
      summary: Get Coding Practice Session
      description: 读取编程练习会话详情。
      operationId: get_coding_practice_session_api_v1_coding_practice_sessions__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/coding-practice/sessions/{session_id}/run:
    post:
      tags:
      - coding-practice
      summary: Run Coding Practice Self Test
      description: 运行编程题自测。
      operationId: run_coding_practice_self_test_api_v1_coding_practice_sessions__session_id__run_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodingPracticeRunRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeExecutionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/coding-practice/sessions/{session_id}/submit:
    post:
      tags:
      - coding-practice
      summary: Submit Coding Practice Solution
      description: 提交编程题解答并正式判题。
      operationId: submit_coding_practice_solution_api_v1_coding_practice_sessions__session_id__submit_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodingPracticeRunRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeExecutionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/coding-practice/records:
    get:
      tags:
      - coding-practice
      summary: List Coding Practice Records
      description: 获取当前用户的编程练习记录。
      operationId: list_coding_practice_records_api_v1_coding_practice_records_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingPracticeRecordsResponse'
